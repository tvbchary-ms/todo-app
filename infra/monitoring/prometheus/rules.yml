# ─────────────────────────────────────────────────────────────
# Prometheus Alerting Rules
# RED Metrics: Rate, Errors, Duration
# ─────────────────────────────────────────────────────────────

groups:
  - name: todo-backend-alerts
    rules:
      # ── Rate ──────────────────────────────────────────────────
      - alert: HighRequestRate
        expr: rate(http_requests_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request rate detected"
          description: "Request rate is {{ $value }} req/s (threshold: 100 req/s)"

      # ── Errors ────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: |
          (
            rate(http_request_errors_total[5m])
            / rate(http_requests_total[5m])
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      - alert: High5xxRate
        expr: |
          (
            rate(http_request_errors_total{status_code=~"5.."}[5m])
            / rate(http_requests_total[5m])
          ) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate"
          description: "5xx error rate is {{ $value | humanizePercentage }} (threshold: 1%)"

      # ── Duration ──────────────────────────────────────────────
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, 
            rate(http_request_duration_seconds_bucket[5m])
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "P95 latency is {{ $value }}s (threshold: 1s)"

      - alert: VeryHighLatency
        expr: |
          histogram_quantile(0.99, 
            rate(http_request_duration_seconds_bucket[5m])
          ) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Very high API latency detected"
          description: "P99 latency is {{ $value }}s (threshold: 5s)"

      # ── Infrastructure ────────────────────────────────────────
      - alert: HighMemoryUsage
        expr: |
          (process_resident_memory_bytes / 1024 / 1024) > 450
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}MB (threshold: 450MB)"

      - alert: HighActiveConnections
        expr: http_active_connections > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High number of active connections"
          description: "{{ $value }} active connections (threshold: 100)"

      - alert: BackendDown
        expr: up{job="todo-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend is down"
          description: "The todo-backend service has been down for more than 1 minute"
